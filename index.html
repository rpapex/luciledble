<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controllo Lampada Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 15px; padding: 20px; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .info-box { background: #252525; border-left: 4px solid #00adb5; padding: 10px; margin: 15px 0; text-align: left; }
        .info-box p { margin: 5px 0; font-size: 14px; }
        .valore { color: #00adb5; font-weight: bold; float: right; }
        h2 { color: #00adb5; }
        label { display: block; text-align: left; margin: 15px 0 5px 5%; font-size: 14px; color: #aaa; }
        select, input { width: 90%; padding: 10px; border-radius: 8px; border: none; background: #333; color: white; margin-bottom: 10px; }
        button { width: 95%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-connect { background: #00adb5; color: white; }
        .row { display: flex; justify-content: space-between; width: 95%; margin: 0 auto; }
        .btn-on { background: #4caf50; color: white; width: 48%; }
        .btn-off { background: #f44336; color: white; width: 48%; }
        .btn-save { background: #ff9800; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>💡 LAMPADA SMART</h2>
    
    <button class="btn-connect" id="connectBtn" onclick="connetti()">CONNETTI BLUETOOTH</button>

    <div class="info-box">
        <p>Ora RTC Lampada: <span id="ora-rtc" class="valore">--:--</span></p>
        <p>Tramonto Previsto: <span id="ora-tramonto" class="valore">--:--</span></p>
    </div>

    <div class="row">
        <button class="btn-on" onclick="inviaComando('ON')">ACCENDI</button>
        <button class="btn-off" onclick="inviaComando('OFF')">SPEGNI</button>
    </div>

    <hr style="border: 0.5px solid #333; margin: 20px 0;">

    <label>Programmazione:</label>
    <select id="sched">
        <option value="1">ATTIVA</option>
        <option value="0">DISATTIVA</option>
    </select>

    <label>Durata (minuti):</label>
    <input type="number" id="durata" value="60">

    <label>Logica:</label>
    <select id="tramonto">
        <option value="1">ACCENDI AL TRAMONTO</option>
        <option value="0">SOLO MANUALE</option>
    </select>

    <button class="btn-save" onclick="salvaImpostazioni()">💾 SALVA IMPOSTAZIONI</button>
</div>

<script>
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    let caratteristicaBLE;

    async function connetti() {
        try {
            const dispositivo = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'LAMPADA' }],
                optionalServices: [SERVICE_UUID]
            });
            const server = await dispositivo.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            caratteristicaBLE = await service.getCharacteristic(CHARACTERISTIC_UUID);

            // Abilita la ricezione di dati dall'ESP32
            await caratteristicaBLE.startNotifications();
            caratteristicaBLE.addEventListener('characteristicvaluechanged', gestisciDatiRicevuti);

            document.getElementById('connectBtn').innerText = "CONNESSO ✅";
            document.getElementById('connectBtn').style.background = "#4caf50";
        } catch (e) { console.error(e); }
    }

    function gestisciDatiRicevuti(event) {
        const value = new TextDecoder().decode(event.target.value);
        console.log("Ricevuto: " + value);

        if (value.startsWith("DATA:")) {
            // Formato: DATA:19:30|1140
            const parti = value.split('|');
            const oraRtc = parti[0].replace("DATA:", "");
            const minutiTramonto = parseInt(parti[1]);

            // Converti minuti totali in HH:MM
            const h = Math.floor(minutiTramonto / 60);
            const m = minutiTramonto % 60;
            const oraTramonto = h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');

            document.getElementById('ora-rtc').innerText = oraRtc;
            document.getElementById('ora-tramonto').innerText = oraTramonto;
        }
    }

    async function inviaComando(cmd) {
        if (!caratteristicaBLE) return;
        await caratteristicaBLE.writeValue(new TextEncoder().encode(cmd));
    }

    async function salvaImpostazioni() {
        const s = document.getElementById('sched').value;
        const d = document.getElementById('durata').value;
        const t = document.getElementById('tramonto').value;
        await inviaComando(`SET:${s}:${d}:${t}`);
        alert("Inviato!");
    }
</script>
</body>
</html>
